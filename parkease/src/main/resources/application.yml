spring:
  datasource:
    url: jdbc:mysql://localhost:3306/parkeasy?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:tej123}
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
        format_sql: true
  flyway:
    enabled: true
    locations: classpath:db/migration

server:
  port: 8080
  servlet:
    context-path: /api

jwt:
  secret: ${JWT_SECRET:parkease-super-secret-key-2024-change-in-production}
  expiration: 86400000  # 24 hours
  refresh-expiration: 604800000  # 7 days

app:
  cors:
    allowed-origins: http://localhost:3000,http://localhost:5173
  pagination:
    default-page-size: 10
    max-page-size: 100

logging:
  level:
    com.parkwise: DEBUG
    org.springframework.security: INFO